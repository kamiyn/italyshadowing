<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#121212" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <title>Italy Shadowing</title>
    <!--
      Reader 本文用フォント (Roboto Serif) は npm パッケージ
      @fontsource-variable/roboto-serif (src/main.js でインポート) からビルド時に
      埋め込む。CDN 依存を避けるため index.html での外部読み込みはしない。
      設計根拠と調整方法は Documents/reader-typography.md を参照。
    -->
    <!--
      SPA single page apps for GitHub Pages — adapted from
      https://github.com/rafgraph/spa-github-pages (MIT).
      Decodes the path that 404.html stashed into the query string,
      so that deep links like /italyshadowing/skit2026spring?page=3 work
      after a hard reload on GitHub Pages.
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&') })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          )
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
