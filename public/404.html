<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Italy Shadowing</title>
    <!--
      SPA single page apps for GitHub Pages — adapted from
      https://github.com/rafgraph/spa-github-pages (MIT).
      pathSegmentsToKeep = 1 because the site is hosted under the
      /italyshadowing/ subpath of <user>.github.io.
      Setting it to 0 would cause an infinite redirect loop.
    -->
    <script>
      (function (l) {
        var pathSegmentsToKeep = 1
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '')
            + l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/')
            + '/?/'
            + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~')
            + (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '')
            + l.hash,
        )
      }(window.location))
    </script>
  </head>
  <body></body>
</html>
